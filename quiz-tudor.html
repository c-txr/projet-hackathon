<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Learn - Quiz Tudors</title>
    <link rel="stylesheet" href="quiz-tudor.css">
</head>
<body>

    <div class="phone-frame">
        <header>
            <h1 class="main-title">WIKI LEARN</h1>
            <h2 class="subtitle">Histoire: Les Tudors</h2>
        </header>

        <div class="visual-container">
            <img src="tudors-image.png" alt="Portraits Tudors" class="main-img">
            <img src="mascotte-cheering.png" alt="Wiki Mascotte" class="mascot">
        </div>

        <p class="question">Qui est le premier monarque de l’époque Tudor ?</p>

        <div class="answers-container">
            <button class="answer-btn">Edward VI</button>
            <button class="answer-btn">Henry VII</button>
            <button class="answer-btn">Henry VIII</button>
        </div>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </div>

</body>
</html>
